<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Child Parent Relationship</title>
    <style>
        #p {
            background-color: lightblue;
            padding: 20px;
            width: 300px;
            height: 200px;
        }
        #c1 {
            background-color: lightcoral;
            padding: 10px;
            width: 280px;
            height: 180px;
        }
        #c2 {
            background-color: lightgreen;
            padding: 10px;
            width: 280px;
            height: 180px;
        }
        /* The child elements (#c and #c2) are nested inside the parent element (#p). 
        Descendant selectors can be used to style the child elements based on their relationship to the parent. */
           #p:hover #c1 {
            color: white;
            border-radius: 250px;
        }
            #p:hover #c2 {
                color: white;
                border-radius: 250px;
            }
            #cc1 {
                background-color: lightyellow;
                padding: 10px;
                width: 260px;
                height: 160px;
            }
             /* The child element (#cc1) is nested inside the child element (#c1), which is nested inside the parent element (#p). */ 
             #p:hover  #cc1 {
                color: black;
                border-radius: 250px;
            } 
    </style>
</head>
<body>
    <div id="p">
        <div id="c1">This is a paragraph inside a div.
            <div id="cc1">This is another paragraph inside the same div.</div>
        </div>
        <div id="c2">This is another paragraph inside the same div.</div>
    </div>
</body>
</html>
